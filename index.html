<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Joyce 💖</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .container {
        text-align: center;
    }

    .btn {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        border-radius: 30px;
        background-color: #ff4d6d;
        color: white;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn:hover {
        transform: scale(1.1);
        background-color: #ff1e4d;
    }

    .card {
        display: none;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        animation: fadeIn 1.5s ease forwards;
        max-width: 400px;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(30px);}
        to {opacity: 1; transform: translateY(0);}
    }

    h1 {
        color: #ff4d6d;
    }

    .heart {
        font-size: 30px;
        animation: pulse 1s infinite;
    }

    @keyframes pulse {
        0% {transform: scale(1);}
        50% {transform: scale(1.3);}
        100% {transform: scale(1);}
    }

    .acciones {
        margin-top: 20px;
    }

    .acciones button {
        margin: 5px;
        padding: 10px 20px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 16px;
    }

    .si {
        background-color: #ff4d6d;
        color: white;
    }

    .obvio {
        background-color: #ff85a1;
        color: white;
    }

    .mensaje-final {
        margin-top: 20px;
        font-size: 18px;
        color: #ff4d6d;
        display: none;
        animation: fadeIn 1s ease forwards;
    }

    .floating-hearts span {
        position: absolute;
        color: rgba(255,255,255,0.7);
        animation: float 6s linear infinite;
    }

    @keyframes float {
        0% {transform: translateY(100vh) scale(0);}
        100% {transform: translateY(-10vh) scale(1);}
    }
</style>
</head>

<body>

<div class="container">
    <button class="btn" onclick="mostrarInvitacion()">Abrir 💌</button>

    <div class="card" id="card">
        <h1>Joyce 💖</h1>

        <p>Mañana quiero invitarte a algo especial... ✨</p>
        <p>Un desayuno juntos en <strong>Emilios</strong> ☕🥐</p>
        <p>Porque cada momento contigo sabe mejor ❤️</p>

        <p class="heart">💖</p>

        <p>¿Aceptas esta cita conmigo? 😍</p>

        <div class="acciones">
            <button class="si" onclick="respuesta()">Sí 💕</button>
            <button class="obvio" onclick="respuesta()">Obvio 😘</button>
        </div>

        <div class="mensaje-final" id="mensaje">
            ¡Sabía que dirías que sí! 💖<br>
            Entonces mañana es una cita en Emilios ☕✨
        </div>
    </div>
</div>

<div class="floating-hearts" id="hearts"></div>

<script>
function mostrarInvitacion() {
    document.querySelector('.btn').style.display = 'none';
    document.getElementById('card').style.display = 'block';
    generarCorazones();
}

function respuesta() {
    document.getElementById('mensaje').style.display = 'block';
}

function generarCorazones() {
    const container = document.getElementById('hearts');

    setInterval(() => {
        const heart = document.createElement('span');
        heart.innerHTML = '💖';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
        heart.style.animationDuration = (Math.random() * 3 + 3) + 's';

        container.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }, 300);
}
</script>

</body>
</html>
