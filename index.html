<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Widget Fullscreen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #zerviz-widget-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh; /* clave para Safari */
      border: 0;
      z-index: 999999;

      /* evita recorte en iPhone */
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>

<script>
(function() {
  var iframe = document.createElement('iframe');
  iframe.id = 'zerviz-widget-frame';
  iframe.src = 'https://proyectoz.cloud/?widget=1&embed=1';

  document.body.appendChild(iframe);

  var payload = {
    "id": "campaign_1773931558880_4nfmb3",
    "campaignKey": "campaign_1773931558880_4nfmb3",
    "channel": "webchat",
    "flowId": "webchat-copa-mngf2dvg",
    "flowName": "copa",
    "widgetId": "widget_1775155742857_9xljk9",
    "widgetName": "Copa",
    "widgetConfig": {
      "primaryColor": "#0400ff",
      "headerColor": "#002aff",
      "backgroundColor": "#e5ddd5",
      "title": "Copa Demo",
      "subtitle": "Asistente Demo",
      "profileImageUrl": "https://cdn.brandfetch.io/id7Krz3SDX/w/331/h/331/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1667671653749",
    "launcherIconUrl": "https://cdn.brandfetch.io/id7Krz3SDX/w/331/h/331/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1667671653749"
    }
  };

  function sendAll() {
    if (!iframe.contentWindow) return;

    // CONFIG
    iframe.contentWindow.postMessage({
      type: 'zerviz:campaign-embed-config',
      payload: payload
    }, '*');

    // 🔥 FORZAR ABIERTO
    iframe.contentWindow.postMessage({
      type: 'zerviz:widget-frame-state',
      payload: { open: true }
    }, '*');
  }

  iframe.onload = function() {
    sendAll();
    setTimeout(sendAll, 500);
    setTimeout(sendAll, 1200);
    setTimeout(sendAll, 2500);
  };

})();
</script>

</body>
</html>
