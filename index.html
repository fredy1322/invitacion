<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Widget Fullscreen Auto Open</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #zerviz-widget-frame {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      border: 0;
      z-index: 999999;
    }
  </style>
</head>
<body>

<script>
(function() {
  var iframe = document.createElement('iframe');
  iframe.id = 'zerviz-widget-frame';
  iframe.src = 'https://proyectoz.cloud/?widget=1&embed=1';

  document.body.appendChild(iframe);

  var payload = {
    "id": "campaign_1773931558880_4nfmb3",
    "campaignKey": "campaign_1773931558880_4nfmb3",
    "channel": "webchat",
    "flowId": "webchat-copa-mngf2dvg",
    "flowName": "copa",
    "widgetId": "widget_1775155742857_9xljk9",
    "widgetName": "Copa",
    "widgetConfig": {
      "primaryColor": "#0400ff",
      "headerColor": "#002aff",
      "backgroundColor": "#e5ddd5",
      "title": "Copa Demo",
      "subtitle": "Asistente automatico",
          "profileImageUrl": "https://cdn.brandfetch.io/id7Krz3SDX/w/331/h/331/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1667671653749",
    "launcherIconUrl": "https://cdn.brandfetch.io/id7Krz3SDX/w/331/h/331/theme/dark/icon.jpeg?c=1bxid64Mup7aczewSAYMX&t=1667671653749"
    }
  };

  function sendConfig() {
    if (!iframe.contentWindow) return;

    iframe.contentWindow.postMessage({
      type: 'zerviz:campaign-embed-config',
      payload: payload
    }, '*');
  }

  function forceOpen() {
    try {
      var doc = iframe.contentWindow.document;

      // intenta encontrar el botón launcher
      var btn = doc.querySelector('button, .launcher, [role="button"]');

      if (btn) {
        btn.click();
        return true;
      }
    } catch (e) {
      // Safari bloquea acceso cross-origin → normal
    }
    return false;
  }

  iframe.onload = function() {
    sendConfig();

    // Reintentos de config
    setTimeout(sendConfig, 500);
    setTimeout(sendConfig, 1200);
    setTimeout(sendConfig, 2000);

    // 🔥 Intentar abrir automáticamente varias veces
    var tries = 0;
    var interval = setInterval(function() {
      var opened = forceOpen();
      tries++;

      if (opened || tries > 10) {
        clearInterval(interval);
      }
    }, 500);
  };

})();
</script>

</body>
</html>
