<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Widget Fullscreen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
    }
  </style>
</head>
<body>

<script>
(function() {
  var iframe = document.createElement('iframe');
  iframe.src = 'https://proyectoz.cloud/?widget=1&embed=1';
  document.body.appendChild(iframe);

  var payload = {
    "id": "campaign_1773931558880_4nfmb3",
    "campaignKey": "campaign_1773931558880_4nfmb3",
    "channel": "webchat",
    "flowId": "webchat-copa-mngf2dvg",
    "flowName": "copa",
    "widgetId": "widget_1775155742857_9xljk9",
    "widgetName": "Copa",
    "widgetConfig": {
      "primaryColor": "#0400ff",
      "headerColor": "#002aff",
      "backgroundColor": "#e5ddd5",
      "title": "Copa Demo",
      "subtitle": "Asistente automatico"
    }
  };

  // Enviar config varias veces (esto suele arreglar el blanco)
  function sendConfig() {
    if (iframe.contentWindow) {
      iframe.contentWindow.postMessage({
        type: 'zerviz:campaign-embed-config',
        payload: payload
      }, '*');
    }
  }

  iframe.onload = function() {
    sendConfig();
    setTimeout(sendConfig, 500);
    setTimeout(sendConfig, 1500);
    setTimeout(sendConfig, 3000);
  };

})();
</script>

</body>
</html>
